<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#ffffff"/>
  <!-- Glass logic from preloader, scaled to fit in 100x100.
       Original preloader is 60x104. We'll give it padding. -->
  <g transform="translate(25, 10) scale(0.833, 0.769)">
    <clipPath id="innerClip">
      <polygon points="9,5 51,5 45,96 15,96"/>
    </clipPath>
    <g clip-path="url(#innerClip)">
      <!-- 85% full water -->
      <rect x="0" y="20" width="60" height="76" fill="#74b9ff" opacity="0.9"/>
    </g>
    <!-- Glass stroke -->
    <polygon points="9,5 51,5 45,96 15,96" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
